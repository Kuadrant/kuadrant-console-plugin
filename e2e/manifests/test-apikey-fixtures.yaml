---
# APIProduct for approval flow tests - references test-route which has test-auth-policy
# (api-key auth, Accepted+Enforced). Controller requires DiscoveredAuthScheme on the
# product before it will keep an APIKeyRequest alive.
apiVersion: devportal.kuadrant.io/v1alpha1
kind: APIProduct
metadata:
  name: test-approval-product
  namespace: kuadrant-test
spec:
  displayName: Test Approval Product
  version: v1.0.0
  description: Product for testing the approval/rejection flow
  publishStatus: Published
  approvalMode: manual
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: test-route
---
# Each test gets its own dedicated consumer so tests are completely independent.
# approve suite - cancel modal → alice
# approve suite - approve request → alice2
# reject-with-reason suite → bob
# reject-without-reason suite → bob2
# bulk-approve suite → carol + dave
# bulk-reject suite → ellen + frank
# deny-active-key suite → george

# ── alice (approve suite - cancel modal test) ────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: consumer-alice
---
apiVersion: v1
kind: Secret
metadata:
  name: alice-api-key
  namespace: consumer-alice
stringData:
  api_key: test-alice-key-12345
---
apiVersion: devportal.kuadrant.io/v1alpha1
kind: APIKey
metadata:
  name: alice-api-key
  namespace: consumer-alice
spec:
  apiProductRef:
    name: test-approval-product
    namespace: kuadrant-test
  planTier: gold
  useCase: "Testing API integration"
  requestedBy:
    userId: "alice"
    email: "alice@example.com"
  secretRef:
    name: alice-api-key
---

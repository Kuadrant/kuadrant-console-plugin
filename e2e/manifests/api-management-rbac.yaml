# Test personas for API Management RBAC E2E verification
# Uses kubectl --as=<username> impersonation for testing
# Users don't need to exist - impersonation creates the RBAC context
---
apiVersion: v1
kind: Namespace
metadata:
  name: api-team-a
  labels:
    team: team-a
---
apiVersion: v1
kind: Namespace
metadata:
  name: api-team-b
  labels:
    team: team-b
---
apiVersion: v1
kind: Namespace
metadata:
  name: api-consumers
  labels:
    purpose: consumer-requests
---
# ============================================================================
# API CONSUMER TEST PERSONA
# Can browse catalog and request API access, but cannot create API products
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: test-api-consumer
  namespace: api-consumers
rules:
  # Create and manage API keys in any namespace
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apikeys"]
    verbs: ["get", "list", "create", "update", "delete"]
  # Read and update APIKey status (for one-time secret viewing)
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apikeys/status"]
    verbs: ["get", "update", "patch"]
  # Read secrets to retrieve API key values
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: test-api-consumer
  namespace: api-consumers
subjects:
  - kind: User
    name: test-api-consumer
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: test-api-consumer
  apiGroup: rbac.authorization.k8s.io
---
# API Consumer catalog reader (cluster-wide)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: test-api-consumer-catalog-reader
rules:
  # Browse all API products
  - apiGroups: ["extensions.kuadrant.io"]
    resources: ["apiproducts"]
    verbs: ["get", "list"]
  # View rate limiting plans
  - apiGroups: ["extensions.kuadrant.io"]
    resources: ["planpolicies"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: test-api-consumer-catalog-reader
subjects:
  - kind: User
    name: test-api-consumer
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: test-api-consumer-catalog-reader
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================================
# API OWNER TEST PERSONA - TEAM A
# Can manage API products and approve requests in team-a namespace only
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: test-api-owner-team-a
  namespace: api-team-a
rules:
  # Manage API products in own namespace
  - apiGroups: ["extensions.kuadrant.io"]
    resources: ["apiproducts"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Approve/reject API keys
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apikeys"]
    verbs: ["get", "list", "create", "update", "delete"]
  # Update APIKey status to approve/reject
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apikeys/status"]
    verbs: ["get", "update", "patch"]
  # Read secrets to troubleshoot API keys
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # View HTTPRoutes to reference in APIProducts
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list"]
  # View Gateways
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: test-api-owner-team-a
  namespace: api-team-a
subjects:
  - kind: User
    name: test-api-owner-team-a
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: test-api-owner-team-a
  apiGroup: rbac.authorization.k8s.io
---
# API Owner catalog reader (cluster-wide for discovery)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: test-api-owner-catalog-reader
rules:
  # Browse all API products
  - apiGroups: ["extensions.kuadrant.io"]
    resources: ["apiproducts"]
    verbs: ["get", "list"]
  # View rate limiting plans
  - apiGroups: ["extensions.kuadrant.io"]
    resources: ["planpolicies"]
    verbs: ["get", "list"]
  # View Gateways cluster-wide
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list"]
  # View HTTPRoutes cluster-wide
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: test-api-owner-team-a-catalog-reader
subjects:
  - kind: User
    name: test-api-owner-team-a
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: test-api-owner-catalog-reader
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================================
# API OWNER TEST PERSONA - TEAM B
# Can manage API products and approve requests in team-b namespace only
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: test-api-owner-team-b
  namespace: api-team-b
rules:
  # Manage API products in own namespace
  - apiGroups: ["extensions.kuadrant.io"]
    resources: ["apiproducts"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  # Approve/reject API keys
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apikeys"]
    verbs: ["get", "list", "create", "update", "delete"]
  # Update APIKey status to approve/reject
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apikeys/status"]
    verbs: ["get", "update", "patch"]
  # Read secrets to troubleshoot API keys
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # View HTTPRoutes
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list"]
  # View Gateways
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: test-api-owner-team-b
  namespace: api-team-b
subjects:
  - kind: User
    name: test-api-owner-team-b
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: test-api-owner-team-b
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: test-api-owner-team-b-catalog-reader
subjects:
  - kind: User
    name: test-api-owner-team-b
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: test-api-owner-catalog-reader
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================================
# API ADMIN TEST PERSONA
# Full access to all API management resources across all namespaces
# ============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: test-api-admin
rules:
  # Full access to API products
  - apiGroups: ["extensions.kuadrant.io"]
    resources: ["apiproducts"]
    verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
  # Full access to API keys
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apikeys"]
    verbs: ["get", "list", "create", "update", "delete", "watch"]
  # Full access to APIKey status
  - apiGroups: ["devportal.kuadrant.io"]
    resources: ["apikeys/status"]
    verbs: ["get", "update", "patch", "watch"]
  # Full access to rate limiting plans
  - apiGroups: ["extensions.kuadrant.io"]
    resources: ["planpolicies", "oidcpolicies"]
    verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]
  # Read secrets for troubleshooting
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  # View all Kuadrant policies
  - apiGroups: ["kuadrant.io"]
    resources: ["authpolicies", "ratelimitpolicies", "dnspolicies", "tlspolicies", "tokenratelimitpolicies"]
    verbs: ["get", "list", "watch"]
  # View Gateway API resources
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes", "gatewayclasses"]
    verbs: ["get", "list", "watch"]
  # Read ConfigMaps
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: test-api-admin
subjects:
  - kind: User
    name: test-api-admin
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: test-api-admin
  apiGroup: rbac.authorization.k8s.io

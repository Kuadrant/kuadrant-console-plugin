---
# HTTPRoute for APIProduct tests to reference
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-httproute
  namespace: kuadrant-test
spec:
  parentRefs:
    - name: test-gateway
      namespace: kuadrant-test
  hostnames:
    - "api.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: test-backend
          port: 8080

---
# AuthPolicy with API Key authentication for testing approval mode
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: test-httproute-auth
  namespace: kuadrant-test
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: test-httproute
  rules:
    authentication:
      "api-key-auth":
        apiKey:
          selector:
            matchLabels:
              authorino.kuadrant.io/managed-by: authorino
          allNamespaces: true
    response:
      success:
        headers:
          "x-auth-data":
            plain:
              value: "authenticated"

---
# APIProduct for testing edit functionality
apiVersion: devportal.kuadrant.io/v1alpha1
kind: APIProduct
metadata:
  name: test-edit-product
  namespace: kuadrant-test
spec:
  displayName: Test Edit Product
  version: v1.0.0
  description: Product for testing edit functionality
  tags:
    - test
    - edit
  publishStatus: Draft
  approvalMode: manual
  documentation:
    openAPISpecURL: https://api.example.com/spec.yaml
    docsURL: https://api.example.com/docs
  contact:
    team: Platform Team
    email: platform@example.com
    slack: "#platform-support"
    url: "https://platform.example.com/support"
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: test-httproute


---
# HTTPRoute with both API Key and JWT authentication
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: test-httproute-multi-auth
  namespace: kuadrant-test
spec:
  parentRefs:
    - name: test-gateway
      namespace: kuadrant-test
  hostnames:
    - "api-multi.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: test-backend
          port: 8080

---
# AuthPolicy with both API Key and JWT authentication
apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: test-httproute-multi-auth
  namespace: kuadrant-test
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: test-httproute-multi-auth
  rules:
    authentication:
      "api-key-auth":
        apiKey:
          selector:
            matchLabels:
              authorino.kuadrant.io/managed-by: authorino
          allNamespaces: true
      "jwt-auth":
        jwt:
          issuerUrl: https://auth.example.com
    response:
      success:
        headers:
          "x-auth-data":
            plain:
              value: "authenticated"

---

name: Unit Tests

on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Run unit tests
        run: yarn test

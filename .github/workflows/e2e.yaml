name: E2E Tests

on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  route:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      specs: ${{ steps.router.outputs.specs }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run suite router
        id: router
        run: |
          chmod +x build/suite-router.sh
          SPECS=$(bash build/suite-router.sh)
          echo "specs=${SPECS}" >> $GITHUB_OUTPUT

  e2e-smoke:
    needs: route
    uses: ./.github/workflows/e2e-common.yaml
    with:
      suite: smoke
      specs: ${{ needs.route.outputs.specs }}

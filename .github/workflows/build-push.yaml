name: Build and Push

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+-?**"
  workflow_dispatch:

env:
  IMG_REGISTRY_HOST: quay.io
  IMG_REGISTRY_ORG: kuadrant
  IMG_REGISTRY_REPO: console-plugin

jobs:
  build:
    name: Build and Push Multi-Arch Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to container registry
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.IMG_REGISTRY_USERNAME }}
          password: ${{ secrets.IMG_REGISTRY_TOKEN }}
          registry: ${{ env.IMG_REGISTRY_HOST }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMG_REGISTRY_HOST }}/${{ env.IMG_REGISTRY_ORG }}/${{ env.IMG_REGISTRY_REPO }}
          flavor: |
            latest=false
          tags: |
            # Dev: git sha on push to main
            type=raw,value=${{ github.sha }},enable={{is_default_branch}}
            # Dev: latest tag on push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # Release: semver tag (e.g. v0.4.0)
            type=semver,pattern={{raw}}
            # Manual: git sha as fallback
            type=raw,value=${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Read quay image expiry
        id: quay-expiry
        run: |
          if [[ "${{ github.ref_name }}" == "main" || "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
            echo "expiry=never" >> $GITHUB_OUTPUT
            echo "Setting expiry to 'never' for ref ${{ github.ref_name }}"
          else
            echo "expiry=3w" >> $GITHUB_OUTPUT
            echo "Setting expiry to '3w' for ref ${{ github.ref_name }}"
          fi

      - name: Build and Push Image
        if: github.repository_owner == 'kuadrant'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/s390x,linux/ppc64le
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            QUAY_IMAGE_EXPIRY=${{ steps.quay-expiry.outputs.expiry }}

      - name: Print Image URL
        run: |
          echo "Image(s) pushed:"
          echo "${{ steps.meta.outputs.tags }}"
